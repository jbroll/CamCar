<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>CamCar Control</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000;
            font-family: Arial, sans-serif;
        }

        #videoContainer {
            width: 100%;
            height: 66vh;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #cameraImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #streamStats {
            margin-top: 3px;
            color: #0f0;
            font: 12px/1.3 monospace;
            white-space: nowrap;
        }

        #resolutionSelect {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            border: 1px solid #0f0;
            font: 12px monospace;
            padding: 2px;
            border-radius: 3px;
        }

        #snapshotBar {
            position: absolute;
            top: 34px;
            right: 6px;
            display: flex;
            gap: 3px;
        }

        #snapshotBar select,
        #snapshotBar button {
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            border: 1px solid #0f0;
            font: 12px monospace;
            padding: 2px 4px;
            border-radius: 3px;
        }

        #controlsContainer {
            width: 100%;
            height: 34vh;
            position: relative;
            display: flex;
            justify-content: space-between;
            margin-top: -20vh; /* Overlap with video */
        }

        .joystick-container {
            /* Equal width/height (and bounded by the controls height) so the
               base is always a circle, in portrait and landscape. */
            width: min(40vw, 32vh);
            height: min(40vw, 32vh);
            position: relative;
        }

        .joystick-base {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: absolute;
            box-sizing: border-box;
        }

        .joystick-thumb {
            width: 30%;
            height: 30%;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            position: absolute;
            top: 35%;
            left: 35%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #connectionStatus {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 5px 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="connectionStatus">
        <span id="connText">Connecting...</span>
        <div id="streamStats">--</div>
    </div>

    <div id="videoContainer">
        <img id="cameraImage" src="" alt="Camera Stream">
        <select id="resolutionSelect" title="Camera resolution">
            <option value="0">QVGA 320x240</option>
            <option value="1">CIF 400x296</option>
            <option value="2" selected>VGA 640x480</option>
            <option value="3">SVGA 800x600</option>
            <option value="4">XGA 1024x768</option>
        </select>
        <div id="snapshotBar">
            <select id="snapResSelect" title="Snapshot resolution">
                <option value="0">VGA</option>
                <option value="1">SVGA</option>
                <option value="2">XGA</option>
                <option value="3">SXGA</option>
                <option value="4" selected>UXGA</option>
            </select>
            <button id="snapView" type="button" title="View snapshot in new tab">&#128247;</button>
            <button id="snapSave" type="button" title="Download snapshot">&#11015;</button>
        </div>
    </div>

    <div id="controlsContainer">
        <div id="motionJoystick" class="joystick-container">
            <div class="joystick-base"></div>
            <div class="joystick-thumb"></div>
        </div>
        <div id="cameraPanTilt" class="joystick-container">
            <div class="joystick-base"></div>
            <div class="joystick-thumb"></div>
        </div>
    </div>

    <script>
        class Joystick {
            constructor(container, onChange) {
                this.container = container;
                this.thumb = container.querySelector('.joystick-thumb');
                this.base = container.querySelector('.joystick-base');
                this.onChange = onChange;
                this.active = false;
                this.centerX = 0;
                this.centerY = 0;
                this.maxDistance = 0;
                this.currentX = 0;
                this.currentY = 0;
                this.touchId = null;   // identifier of the touch this joystick owns

                this.init();
            }

            updateGeometry() {
                const rect = this.base.getBoundingClientRect();
                this.centerX = rect.width / 2;
                this.centerY = rect.height / 2;
                this.maxDistance = rect.width / 2 - this.thumb.clientWidth / 2;
            }

            init() {
                this.updateGeometry();
                window.addEventListener('resize', () => this.updateGeometry());

                // Touch events. passive:false so preventDefault() can stop the
                // page scrolling/zooming while a joystick is being dragged.
                this.container.addEventListener('touchstart', (e) => this.handleStart(e), { passive: false });
                document.addEventListener('touchmove', (e) => this.handleMove(e), { passive: false });
                document.addEventListener('touchend', (e) => this.handleEnd(e), { passive: false });
                document.addEventListener('touchcancel', (e) => this.handleEnd(e), { passive: false });

                // Mouse events
                this.container.addEventListener('mousedown', (e) => this.handleStart(e));
                document.addEventListener('mousemove', (e) => this.handleMove(e));
                document.addEventListener('mouseup', (e) => this.handleEnd(e));
            }

            handleStart(e) {
                if (this.active) return;   // already own a touch
                this.updateGeometry();     // fresh center/radius (orientation-proof)
                if (e.type === 'mousedown') {
                    if (e.target === this.thumb || e.target === this.base) {
                        e.preventDefault();
                        this.active = true;
                        this.touchId = 'mouse';
                        this.container.style.opacity = '1';
                    }
                    return;
                }
                // Touch: claim the new touch that landed on THIS joystick, by id,
                // so the two joysticks can be driven independently (multi-touch).
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (this.container.contains(t.target)) {
                        e.preventDefault();
                        this.active = true;
                        this.touchId = t.identifier;
                        this.container.style.opacity = '1';
                        break;
                    }
                }
            }

            // Return this joystick's tracked pointer from the event, or null.
            getPoint(e) {
                if (this.touchId === 'mouse') return e;
                for (let i = 0; i < e.touches.length; i++) {
                    if (e.touches[i].identifier === this.touchId) return e.touches[i];
                }
                return null;
            }

            handleMove(e) {
                if (!this.active) return;
                const touch = this.getPoint(e);
                if (!touch) return;   // a different finger / joystick moved
                e.preventDefault();

                const rect = this.base.getBoundingClientRect();
                let x = touch.clientX - rect.left;
                let y = touch.clientY - rect.top;

                // Calculate distance from center
                const deltaX = x - this.centerX;
                const deltaY = y - this.centerY;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

                // If distance is greater than max, scale it down
                if (distance > this.maxDistance) {
                    x = this.centerX + (deltaX / distance) * this.maxDistance;
                    y = this.centerY + (deltaY / distance) * this.maxDistance;
                }

                // Update thumb position
                this.thumb.style.left = `${x - this.thumb.clientWidth / 2}px`;
                this.thumb.style.top = `${y - this.thumb.clientHeight / 2}px`;

                // Calculate normalized values (-100 to 100)
                this.currentX = Math.round((x - this.centerX) / this.maxDistance * 100);
                this.currentY = Math.round((y - this.centerY) / this.maxDistance * -100); // Invert Y axis

                if (this.onChange) {
                    this.onChange(this.currentX, this.currentY);
                }
            }

            handleEnd(e) {
                if (!this.active) return;
                if (this.touchId === 'mouse') {
                    if (e.type !== 'mouseup') return;
                } else {
                    let ended = false;
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier === this.touchId) { ended = true; break; }
                    }
                    if (!ended) return;   // some other finger lifted
                }
                e.preventDefault();
                this.active = false;
                this.touchId = null;
                this.container.style.opacity = '0.7';

                // Reset thumb position
                this.thumb.style.left = '35%';
                this.thumb.style.top = '35%';
                this.currentX = 0;
                this.currentY = 0;

                if (this.onChange) {
                    this.onChange(0, 0);
                }
            }
        }

        // Initialize joysticks
        const motionJoystick = new Joystick(
            document.getElementById('motionJoystick'),
            (x, y) => {
                if (websocketCarInput && websocketCarInput.readyState === WebSocket.OPEN) {
                    websocketCarInput.send(`tank ${x} ${y}`);
                }
            }
        );

        const cameraPanTilt = new Joystick(
            document.getElementById('cameraPanTilt'),
            (x, y) => {
                if (websocketCarInput && websocketCarInput.readyState === WebSocket.OPEN) {
                    websocketCarInput.send(`camr  ${x} ${y}`);
                }
            }
        );

        // WebSocket initialization
        var webSocketCameraUrl = "ws://" + window.location.hostname + "/Camera";
        var webSocketCarInputUrl = "ws://" + window.location.hostname + "/CarInput";
        var websocketCamera;
        var websocketCarInput;
        var statFrames = 0, statBytes = 0;

        function initCameraWebSocket() {
            websocketCamera = new WebSocket(webSocketCameraUrl);
            websocketCamera.binaryType = 'blob';
            websocketCamera.onopen = function(event) {
                document.getElementById('connText').textContent = 'Camera Connected';
            };
            websocketCamera.onclose = function(event) {
                document.getElementById('connText').textContent = 'Camera Disconnected - Retrying...';
                setTimeout(initCameraWebSocket, 2000);
            };
            var cameraImage = document.getElementById("cameraImage");
            var prevUrl = null;
            websocketCamera.onmessage = function(event) {
                statFrames++;
                statBytes += event.data.size;
                var url = URL.createObjectURL(event.data);
                cameraImage.src = url;
                // Revoke the previous frame's URL (already displayed) to avoid
                // the unbounded blob leak the original inline handler had.
                if (prevUrl) URL.revokeObjectURL(prevUrl);
                prevUrl = url;
            };
        }

        function initCarInputWebSocket() {
            websocketCarInput = new WebSocket(webSocketCarInputUrl);
            websocketCarInput.onopen = function(event) {
                document.getElementById('connText').textContent = 'Controls Connected';
            };
            websocketCarInput.onclose = function(event) {
                document.getElementById('connText').textContent = 'Controls Disconnected - Retrying...';
                setTimeout(initCarInputWebSocket, 2000);
            };
        }

        // Stream stats overlay (measured in-browser; no serial needed)
        function updateStreamStats() {
            var kb = statFrames ? (statBytes / statFrames / 1024) : 0;
            var img = document.getElementById("cameraImage");
            var res = img.naturalWidth ? img.naturalWidth + "x" + img.naturalHeight : "--";
            document.getElementById("streamStats").textContent =
                statFrames + " fps   " + res + "   " + kb.toFixed(1) + " KB/f";
            statFrames = 0;
            statBytes = 0;
        }

        // Initialize WebSocket connections
        window.onload = function() {
            initCameraWebSocket();
            initCarInputWebSocket();
            setInterval(updateStreamStats, 1000);
            document.getElementById("resolutionSelect").addEventListener("change", function() {
                if (websocketCarInput && websocketCarInput.readyState === WebSocket.OPEN) {
                    websocketCarInput.send("Resolution," + this.value);
                }
            });

            function snapUrl(download) {
                var idx = document.getElementById("snapResSelect").value;
                return "/snapshot?res=" + idx + (download ? "&download=1" : "");
            }
            document.getElementById("snapView").addEventListener("click", function() {
                window.open(snapUrl(false), "_blank");
            });
            document.getElementById("snapSave").addEventListener("click", function() {
                var a = document.createElement("a");
                a.href = snapUrl(true);
                a.download = "snapshot.jpg";
                document.body.appendChild(a);
                a.click();
                a.remove();
            });
        };
    </script>
</body>
</html>
