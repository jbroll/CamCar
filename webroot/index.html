<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>CamCar Control</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="connectionStatus">
        <span id="connText">Connecting...</span>
        <div id="streamStats">--</div>
        <div id="uptime">up --</div>
        <div id="battery">bat --</div>
        <div id="scan"></div>
    </div>

    <div id="videoContainer">
        <img id="cameraImage" src="" alt="Camera Stream">
        <div id="resBar">
            <button id="camBtn" type="button" title="Stop the camera (clears WiFi for solid control); tap again to restart">&#9209;</button>
            <button id="lockBtn" type="button" title="Lock resolution (disable auto-adapt)">&#128275;</button>
            <select id="resolutionSelect" title="Camera resolution (max)">
                <option value="0">QVGA 320x240</option>
                <option value="1">CIF 400x296</option>
                <option value="2" selected>VGA 640x480</option>
                <option value="3">SVGA 800x600</option>
                <option value="4">XGA 1024x768</option>
            </select>
            <select id="qualitySelect" title="JPEG quality (lower q = sharper, more bandwidth)">
                <option value="8">Q: High</option>
                <option value="12" selected>Q: Normal</option>
                <option value="18">Q: Medium</option>
                <option value="26">Q: Low</option>
            </select>
            <select id="xclkSelect" title="Camera clock (XCLK MHz). Higher = more fps but can disturb 2.4GHz WiFi; clean values are per-board (watch the fps/jitter). 8 is always safe. Resets to 8 on reboot.">
                <option value="8" selected>XCLK 8</option>
                <option value="9">XCLK 9</option>
                <option value="10">XCLK 10</option>
                <option value="11">XCLK 11</option>
                <option value="12">XCLK 12</option>
                <option value="13">XCLK 13</option>
                <option value="14">XCLK 14</option>
                <option value="15">XCLK 15</option>
                <option value="16">XCLK 16</option>
                <option value="17">XCLK 17</option>
                <option value="18">XCLK 18</option>
                <option value="19">XCLK 19</option>
                <option value="20">XCLK 20</option>
            </select>
            <button id="tuneBtn" type="button" title="Auto-tune XCLK: scans frequencies and picks the fastest clean one for your WiFi (~40s)">&#128269;</button>
        </div>
        <div id="snapshotBar">
            <button id="lightBtn" type="button" title="Headlight on/off">&#128161;</button>
            <select id="snapResSelect" title="Snapshot resolution">
                <option value="0">VGA</option>
                <option value="1">SVGA</option>
                <option value="2">XGA</option>
                <option value="3">SXGA</option>
                <option value="4" selected>UXGA</option>
            </select>
            <button id="snapView" type="button" title="View snapshot in new tab">&#128247;</button>
            <button id="snapSave" type="button" title="Download snapshot">&#11015;</button>
        </div>
    </div>

    <div id="controlsContainer">
        <div id="motionJoystick" class="joystick-container">
            <div class="joystick-base"></div>
            <div class="joystick-thumb"></div>
        </div>
        <div id="cameraPanTilt" class="joystick-container">
            <div class="joystick-base"></div>
            <div class="joystick-thumb"></div>
        </div>
    </div>

    <script src="/joystick.js"></script>
    <script src="/socket.js"></script>
    <script src="/app.js"></script>
</body>
</html>
