<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>CamCar Control</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000'/><circle cx='16' cy='16' r='9' fill='none' stroke='%230f0' stroke-width='3'/><circle cx='16' cy='16' r='3.5' fill='%230f0'/></svg>">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="videoContainer">
        <img id="cameraImage" src="" alt="Camera Stream">
    </div>

    <button id="menuBtn" type="button" title="Settings">&#9776;</button>

    <div id="controlsContainer">
        <div id="motionJoystick" class="joystick-container">
            <div class="joystick-base"></div>
            <div class="joystick-thumb"></div>
        </div>

        <div id="centerPanel">
            <div id="connectionStatus">
                <span id="streamStats">--</span>
                <span id="uptime">up --</span>
                <span id="battery">bat --</span>
                <span id="scan"></span>
            </div>
            <div id="mainBar">
                <button id="camBtn" type="button" title="Stop the camera (clears WiFi for solid control); tap again to restart">&#9209;</button>
                <button id="lightBtn" type="button" title="Headlight on/off">&#128161;</button>
                <button id="snapView" type="button" title="View snapshot in new tab">&#128247;</button>
                <button id="snapSave" type="button" title="Download snapshot">&#11015;</button>
            </div>
        </div>

        <div id="cameraPanTilt" class="joystick-container">
            <div class="joystick-base"></div>
            <div class="joystick-thumb"></div>
        </div>
    </div>

    <div id="configOverlay" hidden>
        <div id="configDialog">
            <div class="cfg-head">
                <span>Settings</span>
                <button id="cfgClose" type="button" title="Close">&#10005;</button>
            </div>

            <div class="cfg-group">
                <h3>Camera</h3>
                <button id="lockBtn" type="button" title="Lock resolution (disable auto-adapt)">&#128275;</button>
                <select id="resolutionSelect" title="Camera resolution (max)">
                    <option value="0">320x240</option>
                    <option value="1">400x296</option>
                    <option value="2" selected>640x480</option>
                    <option value="3">800x600</option>
                    <option value="4">1024x768</option>
                </select>
                <select id="qualitySelect" title="JPEG quality (lower q = sharper, more bandwidth)">
                    <option value="8">Q: High</option>
                    <option value="12" selected>Q: Normal</option>
                    <option value="18">Q: Medium</option>
                    <option value="26">Q: Low</option>
                </select>
                <select id="fpsSelect" title="Max frame rate. Lower it on a marginal link for smooth, low-latency video; raise it on a strong link. Persisted.">
                    <option value="1">FPS 1</option>
                    <option value="2">FPS 2</option>
                    <option value="3">FPS 3</option>
                    <option value="4">FPS 4</option>
                    <option value="5">FPS 5</option>
                    <option value="8">FPS 8</option>
                    <option value="10">FPS 10</option>
                    <option value="12">FPS 12</option>
                    <option value="15">FPS 15</option>
                    <option value="20">FPS 20</option>
                    <option value="30" selected>FPS 30</option>
                </select>
            </div>

            <div class="cfg-group">
                <h3>Tuning</h3>
                <select id="xclkSelect" title="Camera clock (XCLK MHz). Higher = more fps but can disturb 2.4GHz WiFi; clean values are per-board (use Auto-tune, or watch the fps). 8 is always safe. Persisted; boots safe at 8 if unset."></select>
                <button id="tuneBtn" type="button" title="Auto-tune XCLK: scans frequencies and picks the fastest clean one for your WiFi (~40s)">&#128269;</button>
            </div>

            <div class="cfg-group">
                <h3>Snapshot</h3>
                <select id="snapResSelect" title="Snapshot resolution">
                    <option value="0">640x480</option>
                    <option value="1">800x600</option>
                    <option value="2">1024x768</option>
                    <option value="3">1280x1024</option>
                    <option value="4" selected>1600x1200</option>
                </select>
                <button id="snapViewCfg" type="button" title="View snapshot in new tab">&#128247;</button>
                <button id="snapSaveCfg" type="button" title="Download snapshot">&#11015;</button>
            </div>

            <div class="cfg-group">
                <h3>Firmware Update</h3>
                <input id="otaFile" type="file" accept=".bin">
                <button id="otaBtn" type="button">Upload</button>
                <progress id="otaBar" value="0" max="100"></progress>
                <span id="otaStatus"></span>
            </div>

            <div class="cfg-group" id="netGroup">
                <h3>Network &amp; Security</h3>
                <label class="cfg-field">Hostname
                    <input id="cfgHostname" type="text" autocomplete="off" placeholder="camcar-xxxxxx">
                </label>
                <label class="cfg-field">WiFi SSID
                    <input id="cfgSsid" type="text" autocomplete="off">
                </label>
                <label class="cfg-field">WiFi Password
                    <input id="cfgPass" type="password" autocomplete="new-password" placeholder="(unchanged)">
                </label>
                <label class="cfg-field">Device Password
                    <input id="cfgDevicePass" type="password" autocomplete="new-password" placeholder="(unchanged)">
                </label>
                <button id="cfgSave" type="button">Save network settings</button>
                <span id="cfgStatus"></span>
            </div>

            <div class="cfg-group" id="calGroup">
                <h3>Calibration</h3>
                <label class="cfg-check"><input id="cfgMotSwap" type="checkbox"> Swap L/R motors</label>
                <label class="cfg-check"><input id="cfgMotInvL" type="checkbox"> Invert left motor</label>
                <label class="cfg-check"><input id="cfgMotInvR" type="checkbox"> Invert right motor</label>
                <label class="cfg-field">Left motor PWM min / max (0-255)
                    <span class="cfg-pair"><input id="cfgMotLMin" type="number" min="0" max="255">
                        <input id="cfgMotLMax" type="number" min="0" max="255"></span>
                </label>
                <label class="cfg-field">Right motor PWM min / max (0-255)
                    <span class="cfg-pair"><input id="cfgMotRMin" type="number" min="0" max="255">
                        <input id="cfgMotRMax" type="number" min="0" max="255"></span>
                </label>
                <label class="cfg-check"><input id="cfgCamSwap" type="checkbox"> Swap pan/tilt</label>
                <label class="cfg-check"><input id="cfgPanInv" type="checkbox"> Invert pan</label>
                <label class="cfg-check"><input id="cfgTiltInv" type="checkbox"> Invert tilt</label>
                <label class="cfg-field">Pan min / max (deg)
                    <span class="cfg-pair"><input id="cfgPanMin" type="number" min="0" max="180">
                        <input id="cfgPanMax" type="number" min="0" max="180"></span>
                </label>
                <label class="cfg-field">Tilt min / max (deg)
                    <span class="cfg-pair"><input id="cfgTiltMin" type="number" min="0" max="180">
                        <input id="cfgTiltMax" type="number" min="0" max="180"></span>
                </label>
                <button id="cfgCalSave" type="button">Save calibration</button>
                <span id="cfgCalStatus"></span>
            </div>
        </div>
    </div>

    <script src="/joystick.js"></script>
    <script src="/socket.js"></script>
    <script src="/app.js"></script>
</body>
</html>
